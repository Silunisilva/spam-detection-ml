<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Spam Classifier</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; max-width:700px; margin:40px auto; padding:0 16px; }
      textarea { width:100%; height:120px; }
      button{ padding:8px 12px; margin-top:8px }
      .result{ margin-top:16px; font-weight:700 }
    </style>
  </head>
  <body>
    <h1>Spam Classifierr</h1>
    <p>Enter an SMS message below and click <em>Predict</em>.</p>
    <textarea id="text"></textarea>
    <br />
    <button id="btn">Predict</button>
    <div class="result" id="result"></div>

    <script>
      const btn = document.getElementById('btn');
      const txt = document.getElementById('text');
      const res = document.getElementById('result');

      btn.addEventListener('click', async () => {
        const text = txt.value.trim();
        if (!text) { res.textContent = 'Please enter text.'; return }
        res.textContent = 'Predicting...';
        try {
          const r = await fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
          });
          if (!r.ok) throw new Error(await r.text());
          const data = await r.json();
          res.innerHTML = `Label: <strong>${data.label_str.toUpperCase()}</strong> (${data.label})` +
                        (data.probabilities ? `<br/>Probabilities: ${data.probabilities.map(p=>p.toFixed(3)).join(', ')}` : '');
        } catch (err) {
          res.textContent = 'Error: ' + err.message;
        }
      });
    </script>
  </body>
</html>
